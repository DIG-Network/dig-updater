# The ONE place the beacon's cross-OS binary build lives. It is a REUSABLE workflow
# (`on: workflow_call` only — it never fires on its own): both release paths call it, so the
# OS/arch matrix + the toolchain setup are defined exactly once (DRY, §2.5):
#
#   * release.yml         — the STABLE `vX.Y.Z` tag builder, and
#   * nightly-release.yml  — the NIGHTLY pre-release channel.
#
# The caller passes the version string to stamp into each artifact's filename and, optionally,
# the git ref to build. The job builds BOTH beacon binaries — `dig-updater` (the broker/CLI) and
# `dig-updater-worker` (the unprivileged fetch/verify half it spawns, SPEC §8.3) — for every
# supported OS/arch and uploads them as run artifacts the caller's publish job then attaches to a
# GitHub Release. The two MUST ship together: the broker resolves the worker as a sibling in its
# own directory (`paths::sibling_worker_binary`), so a release with only `dig-updater` cannot run
# a real pass.
#
# The gate runs fmt + clippy only — a PR's own CI (ci.yml) already ran the full
# fmt/clippy/test/coverage set against the merged tree before merge (§2.4a). fmt/clippy are
# deterministic, so they stay as a cheap fail-fast before spending build minutes.
#
# The shipped Windows binaries are named `*updater*`, which trips Windows UAC installer-detection
# (error 740); `.cargo/config.toml` embeds an `asInvoker` manifest at link time so both binaries
# — and the `cargo test` harness — launch unelevated.
name: Build binaries (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: "Version string stamped into each artifact filename (e.g. `1.2.3` or `1.2.3-nightly.20260714.abc1234`)."
        type: string
        required: true
      ref:
        description: "Git ref (tag / branch / SHA) to check out and build. Empty = the caller run's commit."
        type: string
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --component rustfmt --component clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: build (${{ matrix.out_name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            out_name: windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            out_name: linux-x64
          # Both macOS arches build on the fast Apple-silicon macos-14 runner; the Intel binary is
          # cross-compiled there (the beacon's deps are pure Rust — ed25519-dalek/sha2/serde — so
          # no C/openssl cross-compile is involved).
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
            out_name: macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""
            out_name: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Install Rust + target
        shell: bash
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build both beacon binaries
        # `shell: bash` is REQUIRED: GitHub's Windows runner defaults `run:` to PowerShell, which
        # does not understand the bash `\` line-continuation and parses the wrapped `--bin` as its
        # `--` unary operator ("Missing expression after unary operator '--'"). That broke the
        # v0.5.0 release (#504). Git Bash ships on every hosted runner, so bash is portable here.
        shell: bash
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
            --bin dig-updater --bin dig-updater-worker
      - name: Stage both artifacts
        # The caller's `version` is stamped into the filename verbatim: a plain `1.2.3` for a
        # stable tag, or the synthesized `1.2.3-nightly.YYYYMMDD.<shortsha>` for a nightly.
        shell: bash
        run: |
          VER="${{ inputs.version }}"
          mkdir -p dist
          for bin in dig-updater dig-updater-worker; do
            SRC="target/${{ matrix.target }}/release/${bin}${{ matrix.ext }}"
            test -f "$SRC" || { echo "binary not produced: $SRC"; exit 1; }
            cp "$SRC" "dist/${bin}-${VER}-${{ matrix.out_name }}"
          done
          ls -la dist
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dig-updater-${{ matrix.out_name }}
          path: dist/*
          if-no-files-found: error
