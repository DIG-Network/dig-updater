# Ensure the project version is incremented in every PR before it can merge to main.
# Reads [workspace.package].version (or [package].version) from the root Cargo.toml and
# requires it to strictly increase vs the base branch. A version file added new on this
# branch (absent on base) passes. Modeled on Chia-Network/cadt; matches the ecosystem gate.
name: Check Version Increment

on:
  pull_request:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Check version increment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: branch-repo
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          # Compare against the PR's ACTUAL base (main OR the release/X.Y line a hotfix targets),
          # not a hardcoded main — a hotfix PR must increment vs the release branch it lands on.
          ref: ${{ github.base_ref }}
          path: base-repo
      - name: Check version increment
        shell: bash
        run: |
          set -euo pipefail

          # [package].version, or [workspace.package].version for the workspace root.
          # Empty string if the file or the field is absent.
          cargo_version() {
            local f="$1/Cargo.toml"
            [ -f "$f" ] || { echo ""; return; }
            python3 -c 'import sys,tomllib; d=tomllib.load(open(sys.argv[1],"rb")); v=d.get("package",{}).get("version") or d.get("workspace",{}).get("package",{}).get("version") or ""; print(v if isinstance(v,str) else "")' "$f" 2>/dev/null || echo ""
          }
          # strictly-greater semver-ish compare using sort -V; true when $2 > $1
          greater() { [ "$1" != "$2" ] && [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -1)" = "$2" ]; }

          B=base-repo
          H=branch-repo
          if [ ! -f "$H/Cargo.toml" ]; then
            echo "No Cargo.toml at repo root — no version gate to enforce."
            exit 0
          fi

          bc=$(cargo_version "$B"); hc=$(cargo_version "$H")
          echo "Cargo.toml: base='$bc' head='$hc'"
          if [ -z "$bc" ]; then
            echo "Cargo.toml is new on this branch (no base version) — OK."
            exit 0
          fi
          if ! greater "$bc" "$hc"; then
            echo "::error::Cargo.toml version must be incremented ($bc -> $hc) before merging."
            exit 1
          fi
          echo "Version incremented $bc -> $hc — OK."
