# PR quality gates for the dig-updater (DIG auto-update beacon) Rust workspace:
# formatting, linting, tests (on all three OSes), coverage (CI-GATED at >=80% lines), and a
# release build. Runs on every PR to main and on pushes to main so the default branch stays green.
# Job `name:`s are stable — they are the required-check contexts wired on the protected branch.
# See the ecosystem release-gate contract (§2.4a).
#
# The beacon binaries are named "*updater*", which trips Windows UAC installer-detection
# (error 740) unless they embed an `asInvoker` manifest. `.cargo/config.toml` embeds that manifest
# on Windows builds (incl. the `cargo test` harness), so the e2e runs unelevated on the Windows
# runner. Coverage runs on Linux (llvm-cov), where the manifest is irrelevant.
name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    # Lint on Linux AND Windows: the privilege-drop sandbox is `#[cfg]`-split per OS, so a
    # single-OS lint would leave the Windows restricted-token path unchecked.
    name: Clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    # The full suite — including the local-HTTP-server DRY-verify e2e and the adversarial-vector
    # tests — on all three OSes the beacon ships to.
    name: Test (3 OS)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  coverage:
    name: Coverage (>=80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # One combined invocation — running tests and coverage separately would collect no
      # coverage. FAILS the job if line coverage drops below 80% (§2.3).
      - name: cargo llvm-cov (test + coverage gate)
        run: cargo llvm-cov --workspace --locked --fail-under-lines 80 --summary-only | tee coverage-summary.txt
      - name: Coverage summary to job summary
        if: always()
        run: |
          {
            echo '### dig-updater coverage (gated >=80% lines)'
            echo '```'
            cat coverage-summary.txt 2>/dev/null || echo 'no coverage output'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build (release)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release --locked

  scheduler-elevated:
    # The #504-F scheduler artifact (Task Scheduler / systemd timer / launchd) and the
    # single-instance lock's production DACL both require the SAME privilege they run at
    # (Administrator/root) to even be probed — so their `#[ignore]`d tests (SPEC §8.2, §8.3, §9.3)
    # run here, elevated, on all three OSes: `dig-updater schedule install` -> assert the artifact
    # is registered with an Admin/SYSTEM-or-root-owned ACL/mode -> `schedule uninstall` -> assert
    # clean; and the production single-instance mutex actually refuses a second acquire.
    #
    # Windows-hosted GitHub runners already run Administrator-capable without an extra elevation
    # step; Linux/macOS runners are NOT root by default, so those two invoke `sudo -E` to inherit
    # the toolchain env into the elevated process.
    name: Scheduler + lock (elevated, 3 OS)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build test binaries (unprivileged)
        run: cargo test --workspace --locked --no-run
      - name: Elevated tests (Windows — already Administrator-capable)
        if: runner.os == 'Windows'
        run: |
          cargo test -p dig-updater-broker --lib --locked -- --ignored
          cargo test -p dig-updater-broker --test scheduler --locked -- --ignored
      - name: Elevated tests (Unix — via sudo)
        if: runner.os != 'Windows'
        run: |
          sudo -E env "PATH=$PATH" cargo test -p dig-updater-broker --lib --locked -- --ignored
          sudo -E env "PATH=$PATH" cargo test -p dig-updater-broker --test scheduler --locked -- --ignored
