# On a version tag (v*), build the self-contained `dig-updater` beacon binary for every
# supported OS/arch and attach them to a GitHub Release. The tag is created by the
# tag-on-merge workflow (changelog-tag.yml), so the changelog is already in the tag.
# A push to main also builds (no publish) so a broken build is caught before tagging.
#
# The gate runs fmt + clippy only — the PR's own CI (ci.yml) already ran the full
# fmt/clippy/test/coverage set against this merged tree before merge (§2.4a). fmt/clippy
# are deterministic, so they stay as a cheap fail-fast before spending build minutes.
#
# NOTE: the shipped Windows binary is named `dig-updater.exe`; "updater" trips Windows UAC
# installer-detection, so the release build must eventually embed an `asInvoker` manifest
# (a scheduler/OS-integration follow-up, #504-F). This scaffold produces the binary; the
# manifest lands with the OS-integration work.
name: Release dig-updater

on:
  push:
    tags:
      - "v*"
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --component rustfmt --component clippy
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: build (${{ matrix.out_name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: dig-updater.exe
            out_name: windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: dig-updater
            out_name: linux-x64
          # Both macOS arches build on the fast Apple-silicon macos-14 runner; the Intel
          # binary is cross-compiled there (the beacon's deps are pure Rust — ed25519-dalek/
          # sha2/serde — so no C/openssl cross-compile is involved).
          - os: macos-14
            target: aarch64-apple-darwin
            bin: dig-updater
            out_name: macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            bin: dig-updater
            out_name: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Rust + target
        shell: bash
        run: |
          rustup toolchain install stable
          rustup default stable
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin dig-updater
      - name: Stage artifact
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_TYPE" = "tag" ] || VER="g$(git rev-parse --short HEAD)"
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          test -f "$SRC" || { echo "binary not produced: $SRC"; exit 1; }
          cp "$SRC" "dist/dig-updater-${VER}-${{ matrix.out_name }}"
          ls -la dist
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dig-updater-${{ matrix.out_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create / update the release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
